name: missao_reciclar
description: "Aplicativo educativo e gamificado sobre reciclagem e sustentabilidade."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  
  # INTERFACE E UTILITÁRIOS
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  video_player: ^2.10.1

  # MOTOR GRÁFICO (GAME ENGINE) E ÁUDIO
  flame: ^1.30.1
  flame_audio: 
  
  # BANCO DE DADOS LOCAL E NUVEM
  sqflite: ^2.3.0
  path: ^1.8.3
  supabase_flutter: ^2.12.0
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  # Ferramentas de análise de código e geração de ícones
  flutter_lints: ^5.0.0
  flutter_launcher_icons: 

flutter:
  uses-material-design: true

  # Mapeamento das pastas de recursos estáticos do jogo
  assets:
    - assets/images/
    - assets/images/curiosidades/
    - assets/audio/
    - assets/videos/
    - .env

  # Tipografia customizada do Design System
  fonts:
    - family: Archive
      fonts:
        - asset: assets/fonts/Archive.otf

# Configurações do plugin que gera os ícones do app para Android e iOS
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#D9F3FF"
  adaptive_icon_foreground: "assets/icon/logo.png"